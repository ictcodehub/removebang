<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background Paint Swoosh / Splash -->
  <path d="M 4 22 C 10 14, 20 8, 28 10 C 26 14, 18 24, 10 28 Z" fill="#fef08a" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" />
  
  <!-- Paint Droplets flying off -->
  <circle cx="27" cy="15" r="2" fill="#eab308" stroke="#0f172a" stroke-width="1.5" />
  <circle cx="23" cy="22" r="1.5" fill="#eab308" stroke="#0f172a" stroke-width="1.5" />

  <!-- Rotated Paintbrush Group -->
  <g transform="rotate(35 16 16)">
    <!-- Handle -->
    <path d="M 13 18 L 19 18 C 19 23, 17.5 28, 17 30 C 16 31.5, 16 31.5, 15 30 C 14.5 28, 13 23, 13 18 Z" fill="#ca8a04" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" />
    
    <!-- Ferrule (Metal band with ridges) -->
    <path d="M 11 14 L 21 14 L 20 18 L 12 18 Z" fill="#eab308" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" />
    <line x1="12.5" y1="16" x2="19.5" y2="16" stroke="#0f172a" stroke-width="1.5" />

    <!-- Bristles -->
    <path d="M 16 4 C 12 7, 11 10, 11 14 L 21 14 C 21 10, 20 7, 16 4 Z" fill="#facc15" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" />
    
    <!-- Texture lines on bristles -->
    <path d="M 14 9 L 14 12" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 16 7 L 16 12" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 18 9 L 18 12" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>