<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Clip path for split-color 3D shading on the left half -->
    <clipPath id="left-half-clip">
      <rect x="0" y="0" width="16" height="32" />
    </clipPath>
  </defs>

  <!-- 1. Outer Pin Shape - Right Half (Darker Yellow) -->
  <path d="M 8 3 L 24 3 C 26.5 3, 28 4.5, 28 7 L 28 17 C 28 19.5, 26.5 21, 24 21 L 21 21 L 16 29 L 11 21 L 8 21 C 5.5 21, 4 19.5, 4 17 L 4 7 C 4 4.5, 5.5 3, 8 3 Z" fill="#eab308" />
  
  <!-- 2. Outer Pin Shape - Left Half (Lighter Yellow, Clipped) -->
  <path d="M 8 3 L 24 3 C 26.5 3, 28 4.5, 28 7 L 28 17 C 28 19.5, 26.5 21, 24 21 L 21 21 L 16 29 L 11 21 L 8 21 C 5.5 21, 4 19.5, 4 17 L 4 7 C 4 4.5, 5.5 3, 8 3 Z" fill="#facc15" clip-path="url(#left-half-clip)" />
  
  <!-- 3. Outer Pin Outline (Navy) -->
  <path d="M 8 3 L 24 3 C 26.5 3, 28 4.5, 28 7 L 28 17 C 28 19.5, 26.5 21, 24 21 L 21 21 L 16 29 L 11 21 L 8 21 C 5.5 21, 4 19.5, 4 17 L 4 7 C 4 4.5, 5.5 3, 8 3 Z" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" />

  <!-- 4. Center Inner Square Cutout (White) -->
  <rect x="7" y="5.5" width="18" height="13" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2" stroke-linejoin="round" />

  <!-- 5. Circular Sun/Moon inside (Dark Yellow) -->
  <circle cx="11" cy="9" r="2" fill="#eab308" stroke="#0f172a" stroke-width="1.5" />

  <!-- 6. Right Mountain (Larger, drawn behind left mountain) -->
  <path d="M 14 17.5 L 18.5 11.5 L 23 17.5 Z" fill="#eab308" stroke="#0f172a" stroke-width="1.8" stroke-linejoin="round" />

  <!-- 7. Left Mountain (Smaller, drawn in front) -->
  <path d="M 9 17.5 L 13 13 L 17 17.5 Z" fill="#facc15" stroke="#0f172a" stroke-width="1.8" stroke-linejoin="round" />
</svg>