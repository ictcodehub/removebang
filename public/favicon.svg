<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <pattern id="neutral-checker" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#ffffff" />
      <rect width="2" height="2" fill="#e2e8f0" />
      <rect x="2" y="2" width="2" height="2" fill="#e2e8f0" />
    </pattern>
  </defs>

  <!-- Base Photo Frame: Rounded Rect in Clean Slate Gray -->
  <rect x="2.5" y="2.5" width="19" height="19" rx="5" fill="#475569" stroke="#334155" stroke-width="0.75" />

  <!-- Cutout Region: Circle in the center filled with checkerboard -->
  <circle cx="12" cy="12" r="5" fill="url(#neutral-checker)" stroke="#ffffff" stroke-width="1.5" />
</svg>